[options]
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo
admin_passwd = changeme_master_password
db_host = odoo-db
db_port = 5432
db_user = odoo
db_password = odoo

; --- multi-tenant por base de datos ---
db_filter = ^%d$
list_db = False

; --- necesario detrás de cualquier proxy/reverse-proxy ---
proxy_mode = True

; --- producción: ajustar según CPU/RAM disponibles ---
workers = 2
max_cron_threads = 1

longpolling_port = 8072
log_level = info
