services:
  chatwoot-db:
    image: pgvector/pgvector:pg15
    container_name: chatwoot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot
      POSTGRES_DB: chatwoot
    volumes:
      - chatwoot-db-data:/var/lib/postgresql/data
    networks:
      - tenant-net

  chatwoot-redis:
    image: redis:7-alpine
    container_name: chatwoot-redis
    restart: unless-stopped
    volumes:
      - chatwoot-redis-data:/data
    networks:
      - tenant-net

  chatwoot-rails:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-rails
    restart: unless-stopped
    depends_on:
      - chatwoot-db
      - chatwoot-redis
    env_file: .env
    ports:
      - "3000:3000"
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    volumes:
      - chatwoot-storage:/app/storage
    networks:
      - tenant-net

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-sidekiq
    restart: unless-stopped
    depends_on:
      - chatwoot-db
      - chatwoot-redis
    env_file: .env
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - chatwoot-storage:/app/storage
    networks:
      - tenant-net

networks:
  tenant-net:
    external: true

volumes:
  chatwoot-db-data:
  chatwoot-redis-data:
  chatwoot-storage:
